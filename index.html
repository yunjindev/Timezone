<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timezone</title>
    
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <div class="timezoneContainer">
            <p id="currentTimezone">Europe / Placeholder</p>
            <button class="modal__open" data-micromodal-trigger="modal-1">Open</button>
            <!-- [1] -->
            <div class="modal" id="modal-1" aria-hidden="true">

            <!-- [2] -->
                <div class="modal__overlay" tabindex="-1" data-micromodal-close>

                <!-- [3] -->
                    <div class="modal__container" role="dialog" aria-modal="true" aria-labelledby="modal-1-title" >
                        <button class="modal__close" aria-label="Close modal" data-micromodal-close>Close</button>
                        <h2 class="modal__tile" id="modal-1-title">Select your timezone</h2>
                        <select id="timezoneSelect" class="modal__content">
                            <option value="America/New_York">EDT (New York)</option>
                            <option value="America/Chicago">CDT (Chicago)</option>
                            <option value="America/Los_Angeles">PDT (Los Angeles)</option>
                            <option value="Europe/London">BST (London)</option>
                            <option value="Asia/Tokyo">JST (Tokyo)</option>
                        </select>
                        <button id="applyBtn">Apply</button>
                    </div>
                </div>
            </div>
        </div>
        <h1 id="currentTime">01:50:00</h1>
        <h3 id="currentDay">Monday, 1 May, 2023</h3>
    </div>
    <script src="/dist/main.js"></script>
    
</body>
</html>
